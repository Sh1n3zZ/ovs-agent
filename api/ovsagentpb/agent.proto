syntax = "proto3";

package ovsagentpb;

option go_package = "github.com/Sh1n3zZ/ovs-agent/api/ovsagentpb";

// ListFlowsRequest is the request message for querying ovs flows.
// bridge is the name of the OVS bridge to inspect.
// table, cookie and match_expr are optional filters, corresponding to
// OpenFlow match fields (e.g. "table=1,cookie=0x1234/0xffff").
message ListFlowsRequest {
  string bridge = 1;

  // Optional table number to filter flows.
  uint32 table = 2;

  // Optional cookie value to filter flows.
  uint64 cookie = 3;

  // Optional raw OpenFlow match expression for advanced filters.
  string match_expr = 4;
}

// Flow represents a single ovs flow entry in a human-readable form.
// raw is typically the string returned by "ovs-ofctl dump-flows".
message Flow {
  string raw = 1;
}

// ListFlowsResponse is the response message containing the list of flows.
message ListFlowsResponse {
  repeated Flow flows = 1;
}

// InstallStaticARPBindingRequest is the request message for installing a static ARP binding.
message InstallStaticARPBindingRequest {
  // Name of the OVS bridge.
  string bridge = 1;

  // Input port on which ARP packets are received.
  uint32 in_port = 2;

  // IPv4 address for the ARP SPA (e.g. "192.168.1.100").
  string ip = 3;

  // MAC address for the ARP SHA (e.g. "aa:bb:cc:dd:ee:01").
  string mac = 4;
}

// InstallStaticARPBindingResponse contains textual representations of the installed flows.
message InstallStaticARPBindingResponse {
  repeated Flow flows = 1;
}

// RemoveStaticARPBindingRequest is the request message for removing a static ARP binding.
message RemoveStaticARPBindingRequest {
  // Name of the OVS bridge.
  string bridge = 1;

  // Input port on which ARP packets are received.
  uint32 in_port = 2;

  // IPv4 address for the ARP SPA (e.g. "192.168.1.100").
  string ip = 3;

  // MAC address for the ARP SHA (e.g. "aa:bb:cc:dd:ee:01").
  string mac = 4;
}

// RemoveStaticARPBindingResponse is an empty response for successful removal.
message RemoveStaticARPBindingResponse {}

// OVSAgent defines RPCs for interacting with Open vSwitch.
service OVSAgent {
  // ListFlows queries ovs flows for a specific bridge, with optional filters.
  rpc ListFlows(ListFlowsRequest) returns (ListFlowsResponse);

  // InstallStaticARPBinding installs static ARP binding flows for a given (bridge, in_port, ip, mac).
  rpc InstallStaticARPBinding(InstallStaticARPBindingRequest) returns (InstallStaticARPBindingResponse);

  // RemoveStaticARPBinding removes static ARP binding flows for a given (bridge, in_port, ip, mac).
  rpc RemoveStaticARPBinding(RemoveStaticARPBindingRequest) returns (RemoveStaticARPBindingResponse);
}
