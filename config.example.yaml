APP_ENV: development
SERVER_ADDRESS: :8080
CONTEXT_TIMEOUT: 30
DB_HOST: localhost
DB_PORT: 5432
DB_USER: postgres
DB_PASS: password
DB_NAME: light_ve_financial
ACCESS_TOKEN_EXPIRY_HOUR: 24
REFRESH_TOKEN_EXPIRY_HOUR: 168
ACCESS_TOKEN_SECRET: your-access-token-secret
